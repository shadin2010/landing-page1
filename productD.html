              <h3>✨ মূল বৈশিষ্ট্যসমূহ (Key Features)</h3><ul>
              <li><strong>প্রিমিয়াম উডেন ফিনিশ:</strong> চমৎকার ও লাক্সারিয়াস লুক নিশ্চিত করতে হাই-কোয়ালিটি ব্রাউন উড দিয়ে তৈরি।</li>
              <li><strong>নিরাপদ কি-লক সিস্টেম:</strong> আপনার পুরো ঘড়ি কালেকশনকে সুরক্ষিত রাখতে এর সাথে রয়েছে ম্যাচিং মেটাল চাবি।</li>
              <li><strong>সফট ভেলভেট ইন্টেরিয়র লাইনিং:</strong> নরম ভেলভেট কাপড় ঘড়িকে যেকোনো স্ক্র্যাচ ও ড্যামেজ থেকে রক্ষা করে।</li>
              <li><strong>ক্লিয়ার গ্লাস ডিসপ্লে:</strong> ওপরের স্বচ্ছ ক্রিস্টাল গ্লাসের কারণে বক্স না খুলেই ঘড়ি কালেকশন দেখা যায়।</li></ul>`
    };

    // --- ৩) URL ট্র্যাকিং ও ডেটা রেন্ডারিং মেকানিজম ---
    const productId = new URLSearchParams(window.location.search).get('id');
    const product = productsData.find(p => p.id === productId);

    if (product) {
      document.getElementById('prodTitle').innerText = product.name;
      document.getElementById('prodImage').src = product.img;
      document.getElementById('prodOldPrice').innerText = '৳' + product.oldP;
      document.getElementById('prodNewPrice').innerText = '৳' + product.newP;
      document.getElementById('prodDiscount').innerText = '-' + product.disc + '%';

      const fillSelect = (id, data) => {
        const el = document.getElementById(id);
        data.forEach(item => el.innerHTML += `<option value="${item}">${item}</option>`);
      };
      fillSelect('prodSize', product.sizes);
      fillSelect('prodColor', product.colors);

      let type = product.id.includes('ring') ? 'ring' : (product.id.includes('bangle') || product.id.includes('churi') ? 'bangle' : 'watch');
      document.getElementById('prodDescription').innerHTML = descriptions[type] || "<p>বিস্তারিত বিবরণ শীঘ্রই আসছে...</p>";
      
      updateDynamicSpecs();
    } else {
      document.getElementById('prodTitle').innerText = "প্রোডাক্টটি পাওয়া যায়নি!";
    }

    // প্রথমবার পেজ লোড হবার সময় কার্ট নোটিফিকেশন ব্যাজ সংখ্যা বসানো
    updateNavbarCartCount();

    // --- ৪) চুরির বক্সের সাইজ ট্র্যাকার ---
    function updateDynamicSpecs() {
      if (!product) return;
      const sizeVal = document.getElementById('prodSize').value.trim();
      const sizeBox = document.getElementById('bangleDynamicSize');
      
      if (sizeBox) {
        if (sizeVal.includes('5 Roll')) sizeBox.innerText = "Length: 16 inch | Width: 8 inch | Height: 5 inch";
        else if (sizeVal.includes('4 Roll')) sizeBox.innerText = "Length: 13.5 inch | Width: 8 inch | Height: 4 inch";
        else if (sizeVal.includes('3 Roll') || sizeVal.includes('3 Row')) sizeBox.innerText = "Length: 10 inch | Width: 7 inch | Height: 4 inch";
        else sizeBox.innerText = "Length: 12 inch | Width: 4 inch | Height: 4 inch (Single Roll)";
      }
    }

    // --- ৫) ইনডেক্স ফাইলের মতো লাইভ লাল ব্যাজ কাউন্টার আপডেট ---
    function updateNavbarCartCount() {
      let cart = JSON.parse(localStorage.getItem("cartProducts")) || [];
      let totalItems = cart.reduce((total, item) => total + item.quantity, 0);
      document.getElementById('cartCount').innerText = totalItems;
    }

    // --- ৬) কার্ট ও বাই অ্যাকশন ফাংশন ---
    function handleCartAction(isBuyNow = false) {
      if (!product) return;
      
      let cart = JSON.parse(localStorage.getItem("cartProducts")) || [];
      let size = document.getElementById('prodSize').value;
      let color = document.getElementById('prodColor').value;
      
      let exist = cart.find(item => item.id === product.id && item.size === size && item.color === color);
      if (exist) {
        exist.quantity += 1;
      } else {
        cart.push({ id: product.id, name: product.name, price: parseInt(product.newP), image: product.img, size, color, quantity: 1 });
      }
      
      localStorage.setItem("cartProducts", JSON.stringify(cart));
      
      // লাইভ লাল নোটিফিকেশন ব্যাজ সংখ্যা আপডেট
      updateNavbarCartCount();
      
      if (isBuyNow) {
        window.location.href = 'product.html'; 
      } else {
        alert('কার্টে সফলভাবে যোগ হয়েছে!');
      }
    }
  </script>
</body>
